name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgresql://user:password@localhost:5432/projetomvh?schema=public"
      SESSION_SECRET: "ci-session-secret"
      OPENAI_API_KEY: ""
      HERE_API_KEY: ""
      HERE_MAX_ROUTE_CALLS_PER_OPERATION: "180"
      LOCATION_MAINTENANCE_CRON_SECRET: "ci-cron-secret"
      CRON_SECRET: "ci-cron-secret"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
